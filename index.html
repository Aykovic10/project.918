<style>
  /* Dark background behind BMC popup */
  #p918-bmc-backdrop {
    position: fixed;
    inset: 0;
    z-index: 9998;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(12px);
    display: none;
  }

  #p918-bmc-backdrop.active {
    display: block;
  }

  /* Center the Buy Me a Coffee popup iframe */
  #bmc-iframe,
  iframe[src*="buymeacoffee.com"] {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    right: auto !important;
    bottom: auto !important;
    transform: translate(-50%, -50%) !important;
    width: min(460px, calc(100vw - 28px)) !important;
    height: min(680px, calc(100vh - 28px)) !important;
    border-radius: 18px !important;
    z-index: 9999 !important;
    box-shadow: 0 40px 120px rgba(0, 0, 0, 0.65) !important;
  }

  /* Move the BMC close/minimize circle near the centered popup */
  #bmc-wbtn {
    z-index: 10000 !important;
  }

  body.bmc-open #bmc-wbtn {
    position: fixed !important;
    right: calc(50% - min(230px, 50vw - 14px)) !important;
    bottom: calc(50% - min(340px, 50vh - 14px) - 58px) !important;
  }

  @media (max-width: 520px) {
    #bmc-iframe,
    iframe[src*="buymeacoffee.com"] {
      width: calc(100vw - 18px) !important;
      height: calc(100vh - 80px) !important;
      border-radius: 16px !important;
    }

    body.bmc-open #bmc-wbtn {
      right: 18px !important;
      bottom: 18px !important;
    }
  }
</style>

<div id="p918-bmc-backdrop"></div>

<script>
  function centerBMCWidget() {
    const frame =
      document.querySelector("#bmc-iframe") ||
      document.querySelector('iframe[src*="buymeacoffee.com"]');

    if (frame) {
      frame.style.position = "fixed";
      frame.style.top = "50%";
      frame.style.left = "50%";
      frame.style.right = "auto";
      frame.style.bottom = "auto";
      frame.style.transform = "translate(-50%, -50%)";
      frame.style.zIndex = "9999";
    }
  }

  function openBMC() {
    const bmcButton = document.querySelector("#bmc-wbtn");

    if (!bmcButton) {
      alert("Checkout is still loading. Try again in a second.");
      return;
    }

    document.body.classList.add("bmc-open");
    document.getElementById("p918-bmc-backdrop").classList.add("active");

    bmcButton.click();

    setTimeout(centerBMCWidget, 250);
    setTimeout(centerBMCWidget, 700);
    setTimeout(centerBMCWidget, 1200);
  }

  function closeBMCVisuals() {
    document.body.classList.remove("bmc-open");
    document.getElementById("p918-bmc-backdrop").classList.remove("active");
  }

  document.getElementById("p918-bmc-backdrop").addEventListener("click", () => {
    const bmcButton = document.querySelector("#bmc-wbtn");
    if (bmcButton) bmcButton.click();
    closeBMCVisuals();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      const bmcButton = document.querySelector("#bmc-wbtn");
      if (bmcButton) bmcButton.click();
      closeBMCVisuals();
    }
  });

  /* Keep fixing position if BMC reloads/repositions itself */
  setInterval(() => {
    if (document.body.classList.contains("bmc-open")) {
      centerBMCWidget();
    }
  }, 500);
</script>
