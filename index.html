<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project.918 Test Checkout</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #060606;
      color: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #111;
      border: 1px solid #292929;
      border-radius: 26px;
      padding: 28px;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .price {
      font-size: 22px;
      margin-bottom: 22px;
      color: #f5f5f5;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 7px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #050505;
      color: white;
      font-size: 15px;
      outline: none;
    }

    .summary {
      margin-top: 18px;
      background: #070707;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 15px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-line;
      color: #ddd;
    }

    .copy-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: #f4f4f4;
      color: #000;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }

    .bmc-holder {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #8c8c8c;
      line-height: 1.5;
    }

    .success {
      display: none;
      margin-top: 10px;
      color: #ffdd00;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">Project.918 Draft</div>

    <h1>Test Tee</h1>
    <div class="price">$1.00</div>

    <label for="size">Size</label>
    <select id="size">
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <label for="color">Color</label>
    <select id="color">
      <option>Black</option>
      <option>White</option>
    </select>

    <label for="name">Name</label>
    <input id="name" placeholder="Your name" />

    <label for="email">Email</label>
    <input id="email" placeholder="your@email.com" />

    <div class="summary" id="summary"></div>

    <button class="copy-btn" onclick="copyOrder()">
      Copy Order Details
    </button>

    <div class="success" id="success">
      Order details copied. Paste them in the BMC message box.
    </div>

    <div class="bmc-holder" onclick="copyOrder()">
      <script
        type="text/javascript"
        src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
        data-name="bmc-button"
        data-slug="570lNS1kJB"
        data-color="#282828"
        data-emoji="🛒"
        data-font="Lato"
        data-text="Checkout"
        data-outline-color="#ffffff"
        data-font-color="#ffffff"
        data-coffee-color="#FFDD00">
      </script>
    </div>

    <p class="note">
      Test checkout. Pay $1 through Buy Me a Coffee and paste the copied order details in the message box.
    </p>
  </main>

  <script>
    const product = "Project.918 Test Tee";
    const price = "$1.00";
    const orderId = "P918-" + Math.floor(100000 + Math.random() * 900000);

    const size = document.getElementById("size");
    const color = document.getElementById("color");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const summary = document.getElementById("summary");
    const success = document.getElementById("success");

    function buildOrderText() {
      return `Order ID: ${orderId}
Product: ${product}
Price: ${price}
Size: ${size.value}
Color: ${color.value}
Name: ${nameInput.value || "-"}
Email: ${emailInput.value || "-"}`;
    }

    function updateSummary() {
      summary.textContent = buildOrderText();
    }

    async function copyOrder() {
      const text = buildOrderText();

      try {
        await navigator.clipboard.writeText(text);
        success.style.display = "block";
      } catch (e) {
        alert(text);
      }
    }

    size.addEventListener("change", updateSummary);
    color.addEventListener("change", updateSummary);
    nameInput.addEventListener("input", updateSummary);
    emailInput.addEventListener("input", updateSummary);

    updateSummary();
  </script>
</body>
</html>
