<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project.918 Test Shop</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #080808;
      color: #f4f4f4;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: center;
    }

    .product-image {
      background: linear-gradient(145deg, #181818, #050505);
      border: 1px solid #252525;
      min-height: 560px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .mock-shirt {
      width: 260px;
      height: 330px;
      background: #111;
      border-radius: 40px 40px 18px 18px;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      letter-spacing: 2px;
      font-size: 18px;
      font-weight: 700;
    }

    .mock-shirt::before,
    .mock-shirt::after {
      content: "";
      position: absolute;
      top: 40px;
      width: 80px;
      height: 130px;
      background: #111;
      border-radius: 28px;
    }

    .mock-shirt::before {
      left: -56px;
      transform: rotate(18deg);
    }

    .mock-shirt::after {
      right: -56px;
      transform: rotate(-18deg);
    }

    .card {
      background: #101010;
      border: 1px solid #252525;
      border-radius: 26px;
      padding: 30px;
    }

    .brand {
      font-size: 13px;
      letter-spacing: 4px;
      color: #aaa;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .price {
      font-size: 22px;
      margin-bottom: 24px;
      color: #e8e8e8;
    }

    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
      margin-top: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #060606;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .summary {
      margin-top: 22px;
      background: #070707;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 18px;
      font-size: 14px;
      line-height: 1.7;
      color: #ddd;
      white-space: pre-line;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    button,
    a.pay-btn {
      width: 100%;
      padding: 15px;
      border-radius: 999px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    button {
      background: #f4f4f4;
      color: #000;
    }

    a.pay-btn {
      background: #ffdd00;
      color: #000;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #8f8f8f;
      line-height: 1.5;
    }

    @media (max-width: 800px) {
      .page {
        grid-template-columns: 1fr;
      }

      .product-image {
        min-height: 360px;
      }

      .mock-shirt {
        width: 190px;
        height: 250px;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="product-image">
      <div class="mock-shirt">PROJECT.918</div>
    </section>

    <section class="card">
      <div class="brand">Project.918 Draft Shop</div>
      <h1>Test Tee</h1>
      <div class="price">$1.00</div>

      <label for="size">Size</label>
      <select id="size">
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
      </select>

      <label for="color">Color</label>
      <select id="color">
        <option>Black</option>
        <option>White</option>
      </select>

      <label for="name">Name</label>
      <input id="name" placeholder="Your name" />

      <label for="email">Email</label>
      <input id="email" placeholder="your@email.com" />

      <div class="summary" id="summary"></div>

      <div class="buttons">
        <button onclick="copyOrder()">Copy Order Details</button>

        <!-- REPLACE THIS LINK WITH YOUR REAL BUY ME A COFFEE SUPPORT LINK -->
        <a
          class="pay-btn"
          href="https://buymeacoffee.com/570lns1kjb"
          target="_blank"
        >
          Complete $1 Payment
        </a>
      </div>

      <p class="note">
        Payment opens through Buy Me a Coffee. Paste the copied order details in the support message.
      </p>
    </section>
  </main>

  <script>
    const product = "Project.918 Test Tee";
    const price = "$1.00";
    const orderId = "P918-" + Math.floor(100000 + Math.random() * 900000);

    const sizeInput = document.getElementById("size");
    const colorInput = document.getElementById("color");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const summary = document.getElementById("summary");

    function buildOrderText() {
      return `Order ID: ${orderId}
Product: ${product}
Price: ${price}
Size: ${sizeInput.value}
Color: ${colorInput.value}
Name: ${nameInput.value || "-"}
Email: ${emailInput.value || "-"}`;
    }

    function updateSummary() {
      summary.textContent = buildOrderText();
    }

    function copyOrder() {
      navigator.clipboard.writeText(buildOrderText());
      alert("Order details copied. Paste them in the Buy Me a Coffee message.");
    }

    sizeInput.addEventListener("change", updateSummary);
    colorInput.addEventListener("change", updateSummary);
    nameInput.addEventListener("input", updateSummary);
    emailInput.addEventListener("input", updateSummary);

    updateSummary();
  </script>
</body>
</html>
