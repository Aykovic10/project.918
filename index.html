<button class="checkout-btn" onclick="openBMCCheckout()">
  Checkout
</button>

<script>
  const BMC_CHECKOUT_URL = "https://buymeacoffee.com/project.918/extras/checkout/a205c0cb-ad0e-47f1-a4bf-0778465ed2cf";

  function openBMCCheckout() {
    const width = 1050;
    const height = 780;

    const left = window.screenX + (window.outerWidth - width) / 2;
    const top = window.screenY + (window.outerHeight - height) / 2;

    window.open(
      BMC_CHECKOUT_URL,
      "project918_checkout",
      `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
    );
  }
</script>
