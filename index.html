<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project.918 Checkout Test</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #050505;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .card {
      width: 100%;
      max-width: 465px;
      background: #101010;
      border: 1px solid #252525;
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 40px 110px rgba(0, 0, 0, 0.45);
    }

    .brand {
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .price {
      font-size: 24px;
      margin-bottom: 26px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
      color: #999;
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      height: 50px;
      border-radius: 13px;
      border: 1px solid #333;
      background: #050505;
      color: white;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #40DCA5;
    }

    .summary {
      margin-top: 20px;
      padding: 16px;
      background: #070707;
      border: 1px solid #292929;
      border-radius: 18px;
      color: #d7d7d7;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-line;
    }

    .checkout-btn {
      width: 100%;
      height: 58px;
      margin-top: 22px;
      border-radius: 999px;
      border: none;
      background: #40DCA5;
      color: #050505;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .checkout-btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .copied {
      display: none;
      margin-top: 13px;
      font-size: 12px;
      color: #40DCA5;
      text-align: center;
    }

    .note {
      margin-top: 12px;
      color: #888;
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    /* BACKDROP BEHIND BMC */
    #p918BmcBackdrop {
      position: fixed;
      inset: 0;
      z-index: 9997;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(14px);
      display: none;
    }

    #p918BmcBackdrop.active {
      display: block;
    }

    /*
      CUSTOM CLOSE BUTTON.
      It sits naturally on top-right of the centered BMC box.
    */
    #p918BmcClose {
      position: fixed;
      z-index: 10002;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: #111;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #p918BmcClose.active {
      display: flex;
    }

    /*
      This white strip visually covers the ugly BMC scrollbar.
      It does not block scrolling because pointer-events is none.
    */
    #p918ScrollCover {
      position: fixed;
      z-index: 10000;
      display: none;
      width: 18px;
      background: #ffffff;
      pointer-events: none;
      border-radius: 0 28px 28px 0;
    }

    #p918ScrollCover.active {
      display: block;
    }

    /*
      HIDE THE ORIGINAL BMC FLOATING BUTTON.
      We still click it with JS, but the customer sees our own Checkout button.
    */
    #bmc-wbtn {
      opacity: 0 !important;
      pointer-events: none !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
      right: 0 !important;
      bottom: 0 !important;
    }

    /*
      CENTER THE BMC POPUP.
      Bigger height makes it feel less cramped.
    */
    body.bmc-open #bmc-iframe,
    body.bmc-open iframe[src*="buymeacoffee.com"],
    body.bmc-open iframe[id*="bmc"],
    body.bmc-open iframe[name*="bmc"] {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      right: auto !important;
      bottom: auto !important;
      transform: translate(-50%, -50%) !important;
      width: min(530px, calc(100vw - 34px)) !important;
      height: min(760px, calc(100vh - 34px)) !important;
      border-radius: 28px !important;
      z-index: 9999 !important;
      box-shadow: 0 45px 140px rgba(0, 0, 0, 0.72) !important;
      overflow: hidden !important;
    }

    @media (max-width: 540px) {
      .card {
        padding: 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 34px;
      }

      body.bmc-open #bmc-iframe,
      body.bmc-open iframe[src*="buymeacoffee.com"],
      body.bmc-open iframe[id*="bmc"],
      body.bmc-open iframe[name*="bmc"] {
        width: calc(100vw - 18px) !important;
        height: calc(100vh - 44px) !important;
        border-radius: 24px !important;
      }

      #p918ScrollCover {
        width: 16px;
        border-radius: 0 24px 24px 0;
      }

      #p918BmcClose {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">Project.918</div>

    <h1>Test Tee</h1>
    <div class="price">$1.00</div>

    <label for="size">Size</label>
    <select id="size">
      <option>S</option>
      <option selected>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <label for="color">Color</label>
    <select id="color">
      <option selected>Black</option>
      <option>White</option>
    </select>

    <label for="name">Name</label>
    <input id="name" placeholder="Your name" />

    <label for="email">Email</label>
    <input id="email" placeholder="your@email.com" />

    <div class="summary" id="summary"></div>

    <button class="checkout-btn" onclick="checkout()">
      Checkout
    </button>

    <div class="copied" id="copied">
      Order details copied. Paste them in the BMC message box.
    </div>

    <p class="note">
      Payment opens on this page through Buy Me a Coffee.
    </p>
  </main>

  <div id="p918BmcBackdrop"></div>
  <button id="p918BmcClose" onclick="closeBMC()">×</button>
  <div id="p918ScrollCover"></div>

  <!-- BUY ME A COFFEE WIDGET -->
  <script
    data-name="BMC-Widget"
    data-cfasync="false"
    src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
    data-id="project.918"
    data-description="Project.918 Checkout"
    data-message="Paste your Project.918 order details here."
    data-color="#40DCA5"
    data-position="Right"
    data-x_margin="18"
    data-y_margin="18">
  </script>

  <script>
    const product = "Project.918 Test Tee";
    const price = "$1.00";
    const orderId = "P918-" + Math.floor(100000 + Math.random() * 900000);

    const sizeInput = document.getElementById("size");
    const colorInput = document.getElementById("color");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const summary = document.getElementById("summary");
    const copied = document.getElementById("copied");

    const backdrop = document.getElementById("p918BmcBackdrop");
    const customClose = document.getElementById("p918BmcClose");
    const scrollCover = document.getElementById("p918ScrollCover");

    function buildOrderDetails() {
      return `Order ID: ${orderId}
Product: ${product}
Price: ${price}
Size: ${sizeInput.value}
Color: ${colorInput.value}
Name: ${nameInput.value || "-"}
Email: ${emailInput.value || "-"}`;
    }

    function updateSummary() {
      summary.textContent = buildOrderDetails();
    }

    async function copyOrderDetails() {
      const details = buildOrderDetails();

      try {
        await navigator.clipboard.writeText(details);
        copied.style.display = "block";
      } catch (e) {
        alert(details);
      }
    }

    function getBMCFrame() {
      return (
        document.getElementById("bmc-iframe") ||
        document.querySelector('iframe[src*="buymeacoffee.com"]') ||
        document.querySelector('iframe[id*="bmc"]') ||
        document.querySelector('iframe[name*="bmc"]')
      );
    }

    function positionHelpers(frame) {
      if (!frame) return;

      const rect = frame.getBoundingClientRect();

      /*
        Scroll cover:
        sits on top of the right scrollbar only.
      */
      scrollCover.style.left = (rect.right - 18) + "px";
      scrollCover.style.top = rect.top + "px";
      scrollCover.style.height = rect.height + "px";
      scrollCover.style.borderRadius = "0 28px 28px 0";

      /*
        Close button:
        placed naturally inside the top-right of the white checkout card.
      */
      customClose.style.left = (rect.right - 70) + "px";
      customClose.style.top = (rect.top + 24) + "px";
    }

    function forceCenterBMC() {
      const possibleFrames = [
        document.getElementById("bmc-iframe"),
        ...document.querySelectorAll('iframe[src*="buymeacoffee.com"]'),
        ...document.querySelectorAll('iframe[id*="bmc"]'),
        ...document.querySelectorAll('iframe[name*="bmc"]')
      ].filter(Boolean);

      possibleFrames.forEach((frame) => {
        frame.style.setProperty("position", "fixed", "important");
        frame.style.setProperty("top", "50%", "important");
        frame.style.setProperty("left", "50%", "important");
        frame.style.setProperty("right", "auto", "important");
        frame.style.setProperty("bottom", "auto", "important");
        frame.style.setProperty("transform", "translate(-50%, -50%)", "important");
        frame.style.setProperty("width", "min(530px, calc(100vw - 34px))", "important");
        frame.style.setProperty("height", "min(760px, calc(100vh - 34px))", "important");
        frame.style.setProperty("border-radius", "28px", "important");
        frame.style.setProperty("z-index", "9999", "important");
        frame.style.setProperty("box-shadow", "0 45px 140px rgba(0,0,0,.72)", "important");
        frame.style.setProperty("overflow", "hidden", "important");

        positionHelpers(frame);
      });
    }

    async function checkout() {
      await copyOrderDetails();

      const bmcButton = document.querySelector("#bmc-wbtn");

      if (!bmcButton) {
        alert("Checkout is still loading. Try again in one second.");
        return;
      }

      document.body.classList.add("bmc-open");
      backdrop.classList.add("active");
      customClose.classList.add("active");
      scrollCover.classList.add("active");

      bmcButton.click();

      setTimeout(forceCenterBMC, 150);
      setTimeout(forceCenterBMC, 450);
      setTimeout(forceCenterBMC, 900);
      setTimeout(forceCenterBMC, 1400);
      setTimeout(forceCenterBMC, 2200);
    }

    function closeBMC() {
      const bmcButton = document.querySelector("#bmc-wbtn");

      if (bmcButton) {
        bmcButton.click();
      }

      document.body.classList.remove("bmc-open");
      backdrop.classList.remove("active");
      customClose.classList.remove("active");
      scrollCover.classList.remove("active");
    }

    backdrop.addEventListener("click", closeBMC);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeBMC();
      }
    });

    window.addEventListener("resize", () => {
      if (document.body.classList.contains("bmc-open")) {
        forceCenterBMC();
      }
    });

    setInterval(() => {
      if (document.body.classList.contains("bmc-open")) {
        forceCenterBMC();
      }
    }, 350);

    sizeInput.addEventListener("change", updateSummary);
    colorInput.addEventListener("change", updateSummary);
    nameInput.addEventListener("input", updateSummary);
    emailInput.addEventListener("input", updateSummary);

    updateSummary();
  </script>
</body>
</html>
