<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project.918 Checkout Test</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      background: #050505;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 465px;
      background: #101010;
      border: 1px solid #252525;
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 40px 110px rgba(0, 0, 0, 0.45);
    }

    .brand {
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .price {
      font-size: 24px;
      margin-bottom: 26px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
      color: #999;
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      height: 50px;
      border-radius: 13px;
      border: 1px solid #333;
      background: #050505;
      color: white;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #40DCA5;
    }

    .summary {
      margin-top: 20px;
      padding: 16px;
      background: #070707;
      border: 1px solid #292929;
      border-radius: 18px;
      color: #d7d7d7;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-line;
    }

    .checkout-btn {
      width: 100%;
      height: 58px;
      margin-top: 22px;
      border-radius: 999px;
      border: none;
      background: #40DCA5;
      color: #050505;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .checkout-btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .copied {
      display: none;
      margin-top: 13px;
      font-size: 12px;
      color: #40DCA5;
      text-align: center;
    }

    .note {
      margin-top: 12px;
      color: #888;
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    /* Dark backdrop */
    #p918BmcBackdrop {
      position: fixed;
      inset: 0;
      z-index: 9997;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(14px);
      display: none;
    }

    #p918BmcBackdrop.active {
      display: block;
    }

    /*
      Our clean centered shell.
      The BMC iframe gets moved inside this.
      overflow:hidden clips the ugly internal scrollbar.
    */
    #p918BmcShell {
      position: fixed;
      z-index: 9999;
      top: 50%;
      left: 50%;
      width: min(530px, calc(100vw - 34px));
      height: min(760px, calc(100vh - 34px));
      transform: translate(-50%, -50%);
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 45px 140px rgba(0, 0, 0, 0.72);
      display: none;
    }

    #p918BmcShell.active {
      display: block;
    }

    /*
      The iframe is made wider than the shell.
      Its scrollbar moves outside the clipped visible area.
    */
    #p918BmcShell #bmc-iframe,
    #p918BmcShell iframe[src*="buymeacoffee.com"],
    #p918BmcShell iframe[id*="bmc"],
    #p918BmcShell iframe[name*="bmc"] {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: auto !important;
      bottom: auto !important;
      transform: none !important;
      width: calc(100% + 34px) !important;
      height: 100% !important;
      border: 0 !important;
      border-radius: 28px !important;
      z-index: 1 !important;
      box-shadow: none !important;
      overflow: hidden !important;
    }

    /*
      Our close button sits above the iframe.
    */
    #p918BmcClose {
      position: absolute;
      z-index: 3;
      top: 22px;
      right: 34px;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: #111;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
      Hide original floating BMC button.
      We still click it with JS.
    */
    #bmc-wbtn {
      opacity: 0 !important;
      pointer-events: none !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
      right: 0 !important;
      bottom: 0 !important;
    }

    @media (max-width: 540px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 34px;
      }

      #p918BmcShell {
        width: calc(100vw - 18px);
        height: calc(100vh - 44px);
        border-radius: 24px;
      }

      #p918BmcShell #bmc-iframe,
      #p918BmcShell iframe[src*="buymeacoffee.com"],
      #p918BmcShell iframe[id*="bmc"],
      #p918BmcShell iframe[name*="bmc"] {
        width: calc(100% + 34px) !important;
        border-radius: 24px !important;
      }

      #p918BmcClose {
        top: 18px;
        right: 30px;
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">Project.918</div>

    <h1>Test Tee</h1>
    <div class="price">$1.00</div>

    <label for="size">Size</label>
    <select id="size">
      <option>S</option>
      <option selected>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <label for="color">Color</label>
    <select id="color">
      <option selected>Black</option>
      <option>White</option>
    </select>

    <label for="name">Name</label>
    <input id="name" placeholder="Your name" />

    <label for="email">Email</label>
    <input id="email" placeholder="your@email.com" />

    <div class="summary" id="summary"></div>

    <button class="checkout-btn" onclick="checkout()">
      Checkout
    </button>

    <div class="copied" id="copied">
      Order details copied. Paste them in the BMC message box.
    </div>

    <p class="note">
      Payment opens on this page through Buy Me a Coffee.
    </p>
  </main>

  <div id="p918BmcBackdrop"></div>

  <div id="p918BmcShell">
    <button id="p918BmcClose" onclick="closeBMC()">×</button>
  </div>

  <!-- BUY ME A COFFEE WIDGET -->
  <script
    data-name="BMC-Widget"
    data-cfasync="false"
    src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
    data-id="project.918"
    data-description="Project.918 Checkout"
    data-message="Paste your Project.918 order details here."
    data-color="#40DCA5"
    data-position="Right"
    data-x_margin="18"
    data-y_margin="18">
  </script>

  <script>
    const product = "Project.918 Test Tee";
    const price = "$1.00";
    const orderId = "P918-" + Math.floor(100000 + Math.random() * 900000);

    const sizeInput = document.getElementById("size");
    const colorInput = document.getElementById("color");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const summary = document.getElementById("summary");
    const copied = document.getElementById("copied");

    const backdrop = document.getElementById("p918BmcBackdrop");
    const shell = document.getElementById("p918BmcShell");
    const closeButton = document.getElementById("p918BmcClose");

    let bmcIsOpen = false;

    function buildOrderDetails() {
      return `Order ID: ${orderId}
Product: ${product}
Price: ${price}
Size: ${sizeInput.value}
Color: ${colorInput.value}
Name: ${nameInput.value || "-"}
Email: ${emailInput.value || "-"}`;
    }

    function updateSummary() {
      summary.textContent = buildOrderDetails();
    }

    async function copyOrderDetails() {
      const details = buildOrderDetails();

      try {
        await navigator.clipboard.writeText(details);
        copied.style.display = "block";
      } catch (e) {
        alert(details);
      }
    }

    function findBMCFrame() {
      const frames = [
        document.getElementById("bmc-iframe"),
        ...document.querySelectorAll('iframe[src*="buymeacoffee.com"]'),
        ...document.querySelectorAll('iframe[id*="bmc"]'),
        ...document.querySelectorAll('iframe[name*="bmc"]')
      ].filter(Boolean);

      if (!frames.length) return null;

      /*
        Pick the biggest/most visible BMC iframe.
        This avoids grabbing tiny hidden helper iframes.
      */
      return frames.sort((a, b) => {
        const ar = a.getBoundingClientRect();
        const br = b.getBoundingClientRect();
        return (br.width * br.height) - (ar.width * ar.height);
      })[0];
    }

    function dockBMCFrame() {
      const frame = findBMCFrame();

      if (!frame) return false;

      if (frame.parentElement !== shell) {
        shell.insertBefore(frame, closeButton);
      }

      frame.style.setProperty("position", "absolute", "important");
      frame.style.setProperty("top", "0", "important");
      frame.style.setProperty("left", "0", "important");
      frame.style.setProperty("right", "auto", "important");
      frame.style.setProperty("bottom", "auto", "important");
      frame.style.setProperty("transform", "none", "important");
      frame.style.setProperty("width", "calc(100% + 34px)", "important");
      frame.style.setProperty("height", "100%", "important");
      frame.style.setProperty("border", "0", "important");
      frame.style.setProperty("border-radius", "28px", "important");
      frame.style.setProperty("z-index", "1", "important");
      frame.style.setProperty("box-shadow", "none", "important");
      frame.style.setProperty("overflow", "hidden", "important");

      return true;
    }

    async function checkout() {
      await copyOrderDetails();

      const bmcButton = document.querySelector("#bmc-wbtn");

      if (!bmcButton) {
        alert("Checkout is still loading. Try again in one second.");
        return;
      }

      bmcIsOpen = true;
      document.body.classList.add("bmc-open");
      backdrop.classList.add("active");
      shell.classList.add("active");

      bmcButton.click();

      /*
        BMC creates/repositions the iframe after click, so we dock it a few times.
      */
      setTimeout(dockBMCFrame, 100);
      setTimeout(dockBMCFrame, 300);
      setTimeout(dockBMCFrame, 600);
      setTimeout(dockBMCFrame, 1000);
      setTimeout(dockBMCFrame, 1600);
      setTimeout(dockBMCFrame, 2400);
    }

    function closeBMC() {
      const bmcButton = document.querySelector("#bmc-wbtn");

      if (bmcIsOpen && bmcButton) {
        bmcButton.click();
      }

      bmcIsOpen = false;
      document.body.classList.remove("bmc-open");
      backdrop.classList.remove("active");
      shell.classList.remove("active");
    }

    backdrop.addEventListener("click", closeBMC);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeBMC();
      }
    });

    window.addEventListener("resize", () => {
      if (bmcIsOpen) {
        dockBMCFrame();
      }
    });

    setInterval(() => {
      if (bmcIsOpen) {
        dockBMCFrame();
      }
    }, 300);

    sizeInput.addEventListener("change", updateSummary);
    colorInput.addEventListener("change", updateSummary);
    nameInput.addEventListener("input", updateSummary);
    emailInput.addEventListener("input", updateSummary);

    updateSummary();
  </script>
</body>
</html>
