<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project.918 Checkout Test</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      background: #050505;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body.bmc-open {
      overflow: hidden;
    }

    .card {
      width: 100%;
      max-width: 465px;
      background: #101010;
      border: 1px solid #252525;
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 40px 110px rgba(0, 0, 0, 0.45);
      position: relative;
      z-index: 1;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .price {
      font-size: 24px;
      margin-bottom: 26px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
      color: #999;
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      height: 50px;
      border-radius: 13px;
      border: 1px solid #333;
      background: #050505;
      color: white;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #ffffff;
    }

    .summary {
      margin-top: 20px;
      padding: 16px;
      background: #070707;
      border: 1px solid #292929;
      border-radius: 18px;
      color: #d7d7d7;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-line;
    }

    .checkout-btn {
      width: 100%;
      height: 58px;
      margin-top: 22px;
      border-radius: 999px;
      border: none;
      background: #ffffff;
      color: #050505;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .checkout-btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .copied {
      display: none;
      margin-top: 13px;
      font-size: 12px;
      color: #ffffff;
      text-align: center;
    }

    .note {
      margin-top: 12px;
      color: #888;
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    /* CLEAN DARK BACKDROP BEHIND BMC */
    #p918Backdrop {
      position: fixed;
      inset: 0;
      z-index: 9990;
      display: none;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.13), transparent 0 28%),
        radial-gradient(circle at 50% 55%, rgba(0,0,0,0.2), rgba(0,0,0,0.92) 72%);
      backdrop-filter: blur(18px);
    }

    #p918Backdrop.active {
      display: block;
    }

    /* SOFT SHADOW/PLATFORM UNDER THE WIDGET */
    #p918WidgetShadow {
      position: fixed;
      z-index: 9991;
      display: none;
      top: 50%;
      left: 50%;
      width: 520px;
      height: 720px;
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 24px);
      transform: translate(-50%, -50%);
      border-radius: 34px;
      pointer-events: none;
      box-shadow:
        0 55px 150px rgba(0, 0, 0, 0.78),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 0 90px rgba(64, 220, 165, 0.08);
      background: rgba(255, 255, 255, 0.02);
    }

    #p918WidgetShadow.active {
      display: block;
    }

    /*
      Hide the original floating BMC button.
      It still exists, but the customer only sees our Checkout button.
    */
    #bmc-wbtn {
      opacity: 0 !important;
      pointer-events: none !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
      right: 0 !important;
      bottom: 0 !important;
    }

    /*
      Center the BMC widget.
      No cropping. No iframe docking. Just clean centered overlay.
    */
    body.bmc-open #bmc-iframe,
    body.bmc-open iframe[src*="buymeacoffee.com"],
    body.bmc-open iframe[id*="bmc"],
    body.bmc-open iframe[name*="bmc"] {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      right: auto !important;
      bottom: auto !important;
      transform: translate(-50%, -50%) !important;
      z-index: 9999 !important;
      border-radius: 30px !important;
      box-shadow:
        0 45px 120px rgba(0, 0, 0, 0.62),
        0 20px 45px rgba(0, 0, 0, 0.45) !important;
    }

    @media (max-width: 540px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 34px;
      }

      #p918WidgetShadow {
        width: calc(100vw - 22px);
        height: calc(100vh - 70px);
        border-radius: 28px;
      }

      body.bmc-open #bmc-iframe,
      body.bmc-open iframe[src*="buymeacoffee.com"],
      body.bmc-open iframe[id*="bmc"],
      body.bmc-open iframe[name*="bmc"] {
        width: calc(100vw - 22px) !important;
        max-width: calc(100vw - 22px) !important;
        border-radius: 26px !important;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">Project.918</div>

    <h1>Test Tee</h1>
    <div class="price">$1.00</div>

    <label for="size">Size</label>
    <select id="size">
      <option>S</option>
      <option selected>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <label for="color">Color</label>
    <select id="color">
      <option selected>Black</option>
      <option>White</option>
    </select>

    <label for="name">Name</label>
    <input id="name" placeholder="Your name" />

    <label for="email">Email</label>
    <input id="email" placeholder="your@email.com" />

    <div class="summary" id="summary"></div>

    <button class="checkout-btn" onclick="checkout()">
      Checkout
    </button>

    <div class="copied" id="copied">
      Order details copied. Paste them in the BMC message box.
    </div>

    <p class="note">
      Payment opens on this page through Buy Me a Coffee.
    </p>
  </main>

  <div id="p918Backdrop"></div>
  <div id="p918WidgetShadow"></div>

  <!-- BUY ME A COFFEE WIDGET -->
  <script
    data-name="BMC-Widget"
    data-cfasync="false"
    src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
    data-id="project.918"
    data-description="Project.918 Checkout"
    data-message=""
    data-color="#111111"
    data-position="Right"
    data-x_margin="18"
    data-y_margin="18">
  </script>

  <script>
    const product = "Project.918 Test Tee";
    const price = "$1.00";
    const orderId = "P918-" + Math.floor(100000 + Math.random() * 900000);

    const sizeInput = document.getElementById("size");
    const colorInput = document.getElementById("color");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const summary = document.getElementById("summary");
    const copied = document.getElementById("copied");

    const backdrop = document.getElementById("p918Backdrop");
    const widgetShadow = document.getElementById("p918WidgetShadow");

    function buildOrderDetails() {
      return `Order ID: ${orderId}
Product: ${product}
Price: ${price}
Size: ${sizeInput.value}
Color: ${colorInput.value}
Name: ${nameInput.value || "-"}
Email: ${emailInput.value || "-"}`;
    }

    function updateSummary() {
      summary.textContent = buildOrderDetails();
    }

    async function copyOrderDetails() {
      const details = buildOrderDetails();

      try {
        await navigator.clipboard.writeText(details);
        copied.style.display = "block";
      } catch (e) {
        alert(details);
      }
    }

    function centerBMCWidget() {
      const frames = [
        document.getElementById("bmc-iframe"),
        ...document.querySelectorAll('iframe[src*="buymeacoffee.com"]'),
        ...document.querySelectorAll('iframe[id*="bmc"]'),
        ...document.querySelectorAll('iframe[name*="bmc"]')
      ].filter(Boolean);

      frames.forEach((frame) => {
        frame.style.setProperty("position", "fixed", "important");
        frame.style.setProperty("top", "50%", "important");
        frame.style.setProperty("left", "50%", "important");
        frame.style.setProperty("right", "auto", "important");
        frame.style.setProperty("bottom", "auto", "important");
        frame.style.setProperty("transform", "translate(-50%, -50%)", "important");
        frame.style.setProperty("z-index", "9999", "important");
        frame.style.setProperty("border-radius", "30px", "important");
        frame.style.setProperty("box-shadow", "0 45px 120px rgba(0,0,0,0.62), 0 20px 45px rgba(0,0,0,0.45)", "important");
      });
    }

    function showOverlay() {
      document.body.classList.add("bmc-open");
      backdrop.classList.add("active");
      widgetShadow.classList.add("active");
    }

    function hideOverlay() {
      document.body.classList.remove("bmc-open");
      backdrop.classList.remove("active");
      widgetShadow.classList.remove("active");
    }

    async function checkout() {
      await copyOrderDetails();

      const bmcButton = document.querySelector("#bmc-wbtn");

      if (!bmcButton) {
        alert("Checkout is still loading. Try again in one second.");
        return;
      }

      showOverlay();
      bmcButton.click();

      setTimeout(centerBMCWidget, 100);
      setTimeout(centerBMCWidget, 300);
      setTimeout(centerBMCWidget, 700);
      setTimeout(centerBMCWidget, 1200);
    }

    /*
      If customer clicks the dark area, close the BMC widget by clicking the hidden BMC button.
    */
    backdrop.addEventListener("click", () => {
      const bmcButton = document.querySelector("#bmc-wbtn");
      if (bmcButton) bmcButton.click();
      hideOverlay();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        const bmcButton = document.querySelector("#bmc-wbtn");
        if (bmcButton) bmcButton.click();
        hideOverlay();
      }
    });

    setInterval(() => {
      if (document.body.classList.contains("bmc-open")) {
        centerBMCWidget();
      }
    }, 400);

    sizeInput.addEventListener("change", updateSummary);
    colorInput.addEventListener("change", updateSummary);
    nameInput.addEventListener("input", updateSummary);
    emailInput.addEventListener("input", updateSummary);

    updateSummary();
  </script>
</body>
</html>
