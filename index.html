<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project.918 Checkout Test</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #080808;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 360px;
      background: #111;
      border: 1px solid #262626;
      border-radius: 24px;
      padding: 28px;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    .price {
      font-size: 22px;
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 7px;
      color: #999;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input,
    select {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #050505;
      color: white;
      padding: 0 12px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .checkout-btn {
      width: 100%;
      height: 54px;
      margin-top: 22px;
      border-radius: 999px;
      border: none;
      background: #40DCA5;
      color: #050505;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
      color: #888;
      text-align: center;
    }

    .copied {
      display: none;
      margin-top: 12px;
      font-size: 12px;
      color: #40DCA5;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">Project.918</div>

    <h1>Test Tee</h1>
    <div class="price">$1.00</div>

    <label>Size</label>
    <select id="size">
      <option>S</option>
      <option selected>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <label>Name</label>
    <input id="name" placeholder="Your name" />

    <label>Email</label>
    <input id="email" placeholder="your@email.com" />

    <button class="checkout-btn" onclick="checkout()">
      Checkout
    </button>

    <div class="copied" id="copied">
      Order details copied. Paste them in the BMC message box.
    </div>

    <p class="note">
      Payment opens on this page through Buy Me a Coffee.
    </p>
  </main>

  <!-- Hidden BMC widget. We use it as the payment engine. -->
  <script
    data-name="BMC-Widget"
    data-cfasync="false"
    src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
    data-id="project.918"
    data-description="Project.918 Checkout"
    data-message="Paste your Project.918 order details here."
    data-color="#40DCA5"
    data-position="Right"
    data-x_margin="18"
    data-y_margin="18">
  </script>

  <script>
    const orderId = "P918-" + Math.floor(100000 + Math.random() * 900000);

    function buildOrderDetails() {
      const size = document.getElementById("size").value;
      const name = document.getElementById("name").value || "-";
      const email = document.getElementById("email").value || "-";

      return `Order ID: ${orderId}
Product: Project.918 Test Tee
Price: $1.00
Size: ${size}
Name: ${name}
Email: ${email}`;
    }

    async function checkout() {
      const orderDetails = buildOrderDetails();

      try {
        await navigator.clipboard.writeText(orderDetails);
        document.getElementById("copied").style.display = "block";
      } catch (e) {
        alert(orderDetails);
      }

      const bmcButton = document.querySelector("#bmc-wbtn");

      if (bmcButton) {
        bmcButton.click();
      } else {
        alert("Checkout is loading. Try again in one second.");
      }
    }

    // Hide the original floating BMC button
    const hideBMC = setInterval(() => {
      const bmcButton = document.querySelector("#bmc-wbtn");

      if (bmcButton) {
        bmcButton.style.opacity = "0";
        bmcButton.style.pointerEvents = "none";
        bmcButton.style.width = "1px";
        bmcButton.style.height = "1px";
        bmcButton.style.overflow = "hidden";
        clearInterval(hideBMC);
      }
    }, 300);
  </script>
</body>
</html>
